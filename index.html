<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>secretmind | Friendship Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-theme">
    <div id="app">

        <!-- Language Selection Overlay -->
        <div id="lang-overlay" class="lang-overlay">
            <div class="lang-overlay-box">
                <h2 class="lang-overlay-title">secretmind</h2>
                <p class="lang-overlay-subtitle">Choose your language / Choisissez votre langue / اختر لغتك</p>
                <div class="lang-overlay-buttons">
                    <button class="lang-overlay-btn" data-lang="fr">🇫🇷 Français</button>
                    <button class="lang-overlay-btn" data-lang="en">🇬🇧 English</button>
                    <button class="lang-overlay-btn" data-lang="ar">🇸🇦 العربية</button>
                </div>
            </div>
        </div>

        <!-- Top Controls Bar -->
        <div class="top-controls">
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">Light Mode</button>
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="fr">🇫🇷 FR</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
                <button class="lang-btn" data-lang="ar">🇸🇦 AR</button>
            </div>
        </div>

        <!-- Home View -->
        <main id="home-view" class="view active-view">
            <header class="header">
                <img src="logo.png" alt="Logo Secretmind" class="site-logo">
                <h1 class="site-title">secretmind</h1>
                <h2 id="challenge-subtitle" class="subtitle" style="display: none;"></h2>
            </header>

            <nav class="links-container">
                <button id="main-action-btn" class="link-btn primary-btn">
                    <span class="btn-text">CRÉER MON QUIZ AMITIÉ</span>
                    <span class="btn-glitch"></span>
                </button>
            </nav>
        </main>

        <!-- Quiz View -->
        <main id="quiz-view" class="view">
            <!-- Step 1: Name Input -->
            <section id="name-step" class="quiz-step">
                <h2 id="name-title" class="quiz-title">IDENTIFICATION</h2>
                <div class="input-group">
                    <label id="name-prompt" for="player-name">Quel est ton prénom ?</label>
                    <input type="text" id="player-name" placeholder="Entre ton prénom..." autocomplete="off">
                    <p id="name-error" class="error-msg" style="display: none;">Le prénom est obligatoire pour continuer !</p>
                </div>
                <button id="begin-quiz-btn" class="action-btn">CONTINUER</button>
            </section>

            <!-- Step 2: Questions -->
            <section id="question-step" class="quiz-step">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div class="question-wrapper">
                    <h2 id="question-text" class="question-text">Question ?</h2>
                    <div id="answers-container" class="answers-container">
                        <!-- Answers injected via JS -->
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="quiz-navigation">
                        <button id="btn-back" class="nav-btn">&larr; Retour</button>
                        <button id="btn-skip" class="nav-btn">Passer &rarr;</button>
                    </div>
                </div>
            </section>

            <!-- Step 3: Result -->
            <section id="result-step" class="quiz-step">
                <h2 id="result-title" class="result-title">RÉSULTAT</h2>
                <div id="score-display" class="score-display" style="display: none;">
                    <span id="final-score">0</span><span class="score-max">/<span id="total-score">5</span></span>
                </div>
                <p id="engagement-text" class="engagement-text"></p>
                <div id="action-section" class="action-section">
                    <!-- Buttons injected via JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>

</html>
